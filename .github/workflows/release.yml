name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  bootstrap:
    if: github.event_name == 'workflow_dispatch'
    name: Bootstrap prepare-for-release tools project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build prepare-for-release plugin
        run: bun run build packages/prepare-for-release
      - name: Generate tools project via init generator
        run: bunx nx g @nx-devkit/prepare-for-release:init --no-interactive
      - name: Run publish-placeholder executor on tools project
        run: bunx nx run tools:prepare-for-release --dryRun=false

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Publish packages via nx release (OIDC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
      - name: Test
        run: bun test --run
      - name: Verify release versioning intent (dry-run)
        run: npx nx release --skip-publish --dry-run
      - name: Publish via nx release (OIDC trust, no NPM_TOKEN)
        run: npx nx release publish
        env:
          NPM_CONFIG_PROVENANCE: 'true'

  upstream-pr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Open draft PR upstream on nx-devkit/nx.ts
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Open draft PR on upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view --repo nx-devkit/nx.ts --head ThePlenkov:main > /dev/null 2>&1; then
            echo "Upstream PR already exists, skipping."
            exit 0
          fi
          gh pr create \
            --repo nx-devkit/nx.ts \
            --base main \
            --head ThePlenkov:main \
            --draft \
            --title "feat(upstream): docs + skills + @nx-devkit/prepare-for-release + CI release pipeline" \
            --body "Sync of ThePlenkov/nx.ts main into upstream nx-devkit/nx.ts. See fork PR for full context."