name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bootstrap:
    if: github.event_name == 'workflow_dispatch'
    name: Bootstrap prepare-for-release tools project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build prepare-for-release plugin
        run: bun run build packages/prepare-for-release
      - name: Generate tools project via init generator
        run: bunx nx g @nx-devkit/prepare-for-release:init --no-interactive
      - name: Run publish-placeholder executor on tools project
        run: bunx nx run tools:prepare-for-release --dryRun=false

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Publish packages via nx release (OIDC)
    runs-on: ubuntu-latest
    # https://docs.npmjs.com/trusted-publishers-with-npm-cli-and-github-actions
    # OIDC trusted publishing requires:
    #   1. npm >= 11.5 (installed by `npm install -g npm@latest` below)
    #   2. `registry-url` on actions/setup-node (already configured)
    #   3. `NPM_CONFIG_PROVENANCE=true` (set on the publish step)
    #   4. `id-token: write` permission (declared at job level)
    # No NODE_AUTH_TOKEN / NPM_TOKEN is needed; npm exchanges the GHA OIDC
    # token for a short-lived npm registry token automatically.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Lint
        run: bun run lint
      - name: Check plugin/spec conflicts
        run: bun run check:spec
      - name: Build
        run: bun run build
      - name: Test
        run: bun test --run
      - name: E2E
        run: bash scripts/e2e.sh
      - name: Verify release versioning intent (dry-run)
        run: npx nx release --skip-publish --dry-run
      - name: Publish via nx release (OIDC trust, no NPM_TOKEN)
        run: npx nx release publish
        env:
          NPM_CONFIG_PROVENANCE: 'true'

  upstream-pr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Open draft PR upstream on nx-devkit/nx.ts
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Open draft PR on upstream
        # Cross-repo PR creation requires a PAT with repo scope on the
        # upstream org. The default GITHUB_TOKEN is scoped to this repo
        # only and will be rejected by the upstream API. Set the
        # UPSTREAM_GITHUB_TOKEN secret in repo settings (Settings →
        # Secrets and variables → Actions) before this job will succeed.
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view --repo nx-devkit/nx.ts --head ThePlenkov:main > /dev/null 2>&1; then
            echo "Upstream PR already exists, skipping."
            exit 0
          fi
          gh pr create \
            --repo nx-devkit/nx.ts \
            --base main \
            --head ThePlenkov:main \
            --draft \
            --title "feat(upstream): docs + skills + @nx-devkit/prepare-for-release + CI release pipeline" \
            --body "Sync of ThePlenkov/nx.ts main into upstream nx-devkit/nx.ts. See fork PR for full context."
